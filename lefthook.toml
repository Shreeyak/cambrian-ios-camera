# lefthook.toml — git hooks for eva-swift-stitch, managed by lefthook
# (https://lefthook.dev).
#
# WHY lefthook instead of git's core.hooksPath + a .githooks/ dir:
# `lefthook install` writes its runner into .git/hooks/, so the hooks fire no
# matter what core.hooksPath points at. The worktree tooling repeatedly resets
# core.hooksPath to the default .git/hooks (it writes the *shared* .git/config,
# common to every linked worktree), which silently disabled the old .githooks
# setup more than once. Installing into .git/hooks makes that reset a no-op. This
# file at the repo root is also the recognized, declarative "hooks live here"
# marker. See CLAUDE.md §6.0 and §10.
#
# One-time per clone:
#   brew install lefthook
#   lefthook install
#
# Do NOT set core.hooksPath — leave it unset (default). If you ever see it set,
# `git config --unset core.hooksPath` and the hooks keep working.
# Skip for a genuine emergency: git commit --no-verify / git push --no-verify.

[pre-commit]

# Authoritative style gate: swift-format --strict on staged CameraKit sources.
# SwiftLint is intentionally NOT a gate (CLAUDE.md §6.0) — it flags deliberate
# patterns (test-seam identifiers, the large CameraEngine actor) and crashes
# standalone on the beta toolchain.
[pre-commit.commands.swift-format]
glob = "CameraKit/Sources/CameraKit/*.swift"
run = "swift-format lint --strict {staged_files}"

# Keep CameraKit/CONTRACTS.md in sync with the sources and stage it, so the
# refreshed contract lands in the same commit (one attempt). The regen is
# byte-deterministic (no embedded timestamp), so this only produces a diff on a
# real API-shape change. lefthook does not abort on hook-modified files, so the
# explicit `git add` here just works.
[pre-commit.commands.regen-contracts]
glob = "CameraKit/Sources/CameraKit/*.swift"
run = "scripts/regen-contracts.sh && git add CameraKit/CONTRACTS.md"

[pre-push]

# Keep the camerakit-only synthetic branch in sync so the Flutter consumer
# (cam2fd) can subtree-pull it. See CLAUDE.md §10.
#
# Implemented as a lefthook *script* (`.lefthook/pre-push/sync-camerakit-only.sh`),
# NOT a command, on purpose: lefthook commands are file-filtered and skip with
# "no matching push files" when a push changes nothing, whereas scripts run
# unconditionally on every push. We want this to fire on EVERY push so the
# synthetic branch self-heals even after a no-op / non-CameraKit push. The script
# is git-state-driven and idempotent (no-op when origin/camerakit-only is already
# current), so running it every time is cheap and safe.
[pre-push.scripts."sync-camerakit-only.sh"]
runner = "bash"
