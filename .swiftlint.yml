# SwiftLint configuration for ios_example_app
# iPad-only app; Swift strict concurrency enforced at build time

included:
  - ios_example_app/ios_example_app
  - ios_example_app/Tests
  - ios_example_app/UITests

excluded:
  - ios_example_app/ios_example_app.xcodeproj

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - todo              # TODOs are used for phase tracking
  - trailing_comma    # personal preference

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 700

function_body_length:
  warning: 50
  error: 80

type_name:
  allowed_symbols: ["_"]   # permit underscore in Xcode-generated names
  excluded:                 # Xcode-generated boilerplate with lowercase prefix
    - ios_example_appApp
    - ios_example_appTests
    - ios_example_appUITests
    - ios_example_appUITestsLaunchTests

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - z
    - dx
    - dy
    - dz
    - ok

reporter: "xcode"
